<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>WheelMakerRN</title><script src="/runtime-config.js"></script><style>@font-face {
        font-family: 'vscode-seti';
        src: url('/assets/seti.woff') format('woff'), url('/assets/seti.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'vscode-codicon';
        src: url('/assets/codicon.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }

      html,
      body,
      #root,
      #root > div {
        height: 100%;
        min-height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        overflow: hidden;
        font-family: 'Segoe WPC', 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue',
          sans-serif;
      }

      @media (max-width: 639px) {
        body {
          font-size: 13px;
        }
      }

      @media (min-width: 640px) and (max-width: 1023px) {
        body {
          font-size: 15px;
        }
      }

      @media (min-width: 1024px) {
        body {
          font-size: 14px;
        }
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: #5f5f5f #252526;
      }

      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      *::-webkit-scrollbar-track {
        background: #252526;
      }

      *::-webkit-scrollbar-thumb {
        background: #5f5f5f;
        border-radius: 6px;
        border: 2px solid #252526;
      }

      *::-webkit-scrollbar-thumb:hover {
        background: #757575;
      }

      pre,
      code {
