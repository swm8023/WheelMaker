name: wheelmaker
description: WheelMaker mobile client — remote control for AI coding assistants.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # WebSocket communication
  web_socket_channel: ^3.0.1
  # Persist server address and token across restarts
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
