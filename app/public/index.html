<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WheelMakerRN</title>
    <style>
      html,
      body,
      #root,
      #root > div {
        height: 100%;
        min-height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
      }

      body {
        overflow: hidden;
      }
      * {
        scrollbar-width: thin;
        scrollbar-color: #5f5f5f #252526;
      }

      *::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      *::-webkit-scrollbar-track {
        background: #252526;
      }

      *::-webkit-scrollbar-thumb {
        background: #5f5f5f;
        border-radius: 6px;
        border: 2px solid #252526;
      }

      *::-webkit-scrollbar-thumb:hover {
        background: #757575;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
