<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="720" viewBox="0 0 1080 720" role="img" aria-labelledby="title desc">
  <title id="title">Unified session picker</title>
  <desc id="desc">Illustration of the unified new and resume session picker UI.</desc>
  <defs>
    <style>
      .bg { fill: #0b1120; }
      .shell { fill: #111827; stroke: #334155; stroke-width: 2; rx: 22; }
      .overlay { fill: #1f2937; stroke: #60a5fa; stroke-width: 2; rx: 18; }
      .chip { fill: #172554; stroke: #60a5fa; stroke-width: 2; rx: 12; }
      .ghost { fill: #0f766e; stroke: #5eead4; stroke-width: 2; rx: 12; }
      .title { font: 600 28px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .sub { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .note { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
    </style>
  </defs>
  <rect width="1080" height="720" class="bg"/>
  <text x="50" y="60" class="title">Unified session picker</text>

  <rect x="60" y="110" width="960" height="560" class="shell"/>
  <rect x="250" y="170" width="580" height="380" class="overlay"/>

  <text x="290" y="220" class="sub">History / Add + Title</text>
  <rect x="760" y="188" width="42" height="42" class="chip"/>
  <text x="776" y="216" class="sub">×</text>

  <text x="290" y="265" class="note">One shared visual language for the card, header, close button, subtitle, and action/list rhythm.</text>

  <rect x="290" y="300" width="110" height="44" class="chip"/>
  <rect x="416" y="300" width="110" height="44" class="chip"/>
  <rect x="542" y="300" width="110" height="44" class="chip"/>
  <text x="314" y="329" class="text">Claude</text>
  <text x="444" y="329" class="text">Codex</text>
  <text x="563" y="329" class="text">Copilot</text>

  <rect x="290" y="372" width="146" height="40" class="ghost"/>
  <text x="317" y="398" class="text">← Change agent</text>

  <rect x="290" y="430" width="500" height="78" class="chip"/>
  <text x="320" y="463" class="sub">Resume item / New item</text>
  <text x="320" y="492" class="text">Title, preview, updated time, and message count all follow the same button-card pattern.</text>

  <rect x="60" y="590" width="960" height="60" class="ghost"/>
  <text x="88" y="627" class="text">Behavior stays separate: New Session creates after agent pick; Resume Session picks agent → import → reload → load history.</text>
</svg>
