<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">App workspace overview</title>
  <desc id="desc">Stylized overview of the WheelMaker web workspace with chat, file and git capabilities.</desc>
  <defs>
    <style>
      .bg { fill: #0b1120; }
      .shell { fill: #111827; stroke: #334155; stroke-width: 2; rx: 22; }
      .panel { fill: #1f2937; stroke: #475569; stroke-width: 2; rx: 16; }
      .accent { fill: #172554; stroke: #60a5fa; stroke-width: 2; rx: 14; }
      .tab { fill: #0f766e; stroke: #5eead4; stroke-width: 2; rx: 12; }
      .title { font: 600 28px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .sub { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .note { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
    </style>
  </defs>
  <rect width="1280" height="760" class="bg"/>
  <text x="50" y="60" class="title">WheelMaker App 工作区示意</text>

  <rect x="40" y="90" width="1200" height="620" class="shell"/>
  <rect x="60" y="110" width="1160" height="52" class="accent"/>
  <text x="90" y="143" class="sub">Project Selector · Registry Address · Runtime · Theme / Font / Token Stats</text>

  <rect x="60" y="185" width="260" height="500" class="panel"/>
  <text x="85" y="220" class="sub">Sidebar</text>
  <text x="85" y="255" class="text">• 项目切换</text>
  <text x="85" y="285" class="text">• Session 列表</text>
  <text x="85" y="315" class="text">• New / Resume</text>
  <text x="85" y="345" class="text">• Swipe Reload / Delete</text>
  <text x="85" y="375" class="text">• 在线状态</text>
  <text x="85" y="405" class="text">• Agent 分组</text>

  <rect x="345" y="185" width="875" height="500" class="panel"/>
  <rect x="365" y="205" width="250" height="48" class="tab"/>
  <rect x="628" y="205" width="250" height="48" class="tab"/>
  <rect x="891" y="205" width="250" height="48" class="tab"/>
  <text x="450" y="236" class="sub">Chat</text>
  <text x="716" y="236" class="sub">File</text>
  <text x="983" y="236" class="sub">Git</text>

  <rect x="365" y="275" width="390" height="270" class="accent"/>
  <text x="390" y="315" class="sub">Chat</text>
  <text x="390" y="348" class="text">• 流式消息</text>
  <text x="390" y="378" class="text">• Markdown / Mermaid / KaTeX</text>
  <text x="390" y="408" class="text">• 会话历史补载</text>
  <text x="390" y="438" class="text">• 文件链接跳转</text>
  <text x="390" y="468" class="text">• 图片附件发送</text>

  <rect x="780" y="275" width="415" height="125" class="accent"/>
  <text x="805" y="315" class="sub">File</text>
  <text x="805" y="348" class="text">• 目录树浏览</text>
  <text x="805" y="378" class="text">• pinned files / 缓存 / 滚动恢复</text>

  <rect x="780" y="420" width="415" height="125" class="accent"/>
  <text x="805" y="460" class="sub">Git</text>
  <text x="805" y="493" class="text">• branch / status / commit / diff</text>
  <text x="805" y="523" class="text">• staged / unstaged / untracked</text>

  <rect x="365" y="565" width="830" height="90" class="tab"/>
  <text x="395" y="605" class="sub">Composer & Live State</text>
  <text x="395" y="635" class="text">发送消息、附件操作、自动重连、本地通知、PWA 前后台恢复</text>

  <text x="50" y="735" class="note">README 中的“功能”部分会围绕这几块真实能力来展开，而不是只列多 agent / 多项目这种抽象标签。</text>
</svg>
