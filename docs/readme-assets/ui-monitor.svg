<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Monitor overview</title>
  <desc id="desc">Illustration of the monitor page showing hub status, logs, projects and actions.</desc>
  <defs>
    <style>
      .bg { fill: #0b1120; }
      .shell { fill: #111827; stroke: #334155; stroke-width: 2; rx: 22; }
      .panel { fill: #1f2937; stroke: #475569; stroke-width: 2; rx: 16; }
      .accent { fill: #172554; stroke: #60a5fa; stroke-width: 2; rx: 14; }
      .ok { fill: #0f766e; stroke: #5eead4; stroke-width: 2; rx: 12; }
      .title { font: 600 28px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .sub { font: 600 18px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
      .text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .note { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
    </style>
  </defs>
  <rect width="1180" height="720" class="bg"/>
  <text x="50" y="60" class="title">Monitor 页面示意</text>

  <rect x="40" y="100" width="1100" height="580" class="shell"/>

  <rect x="70" y="130" width="260" height="110" class="ok"/>
  <text x="95" y="175" class="sub">Hub Status</text>
  <text x="95" y="205" class="text">hub-a / hub-b 在线状态</text>

  <rect x="355" y="130" width="260" height="110" class="accent"/>
  <text x="385" y="175" class="sub">Services</text>
  <text x="385" y="205" class="text">WheelMaker / Monitor / Updater</text>

  <rect x="640" y="130" width="470" height="110" class="accent"/>
  <text x="670" y="175" class="sub">Actions</text>
  <text x="670" y="205" class="text">start / stop / restart / update-publish / clear-session-history</text>

  <rect x="70" y="275" width="500" height="360" class="panel"/>
  <text x="100" y="320" class="sub">Logs</text>
  <text x="100" y="355" class="text">• hub.log</text>
  <text x="100" y="385" class="text">• registry.log</text>
  <text x="100" y="415" class="text">• updater.log</text>
  <text x="100" y="445" class="text">• debug / registry-debug</text>
  <text x="100" y="500" class="note">按 hub 查看日志，适合排查多 hub 现场。</text>

  <rect x="600" y="275" width="510" height="165" class="panel"/>
  <text x="630" y="320" class="sub">Projects</text>
  <text x="630" y="355" class="text">项目列表、agent、IM 类型、在线状态、路径</text>
  <text x="630" y="385" class="text">支持通过 registry 汇总远端 hub 项目</text>

  <rect x="600" y="470" width="510" height="165" class="panel"/>
  <text x="630" y="515" class="sub">Database / Runtime Info</text>
  <text x="630" y="548" class="text">客户端 DB 表、服务状态、进程角色、时间戳</text>
  <text x="630" y="578" class="note">适合作为“系统活没活着”的第一入口。</text>
</svg>
